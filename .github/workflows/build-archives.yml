name: Build template archives

# Builds a flat per-template ZIP for every template (main.tex at the root)
# and publishes them to the `dist` branch as a single squashed commit, so
# `latex-forge template install <gallery-url>` can download just one
# template instead of the whole repository. See scripts/build_archives.py.

on:
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "scripts/build_archives.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & publish per-template ZIPs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build archives
        run: python3 scripts/build_archives.py --output dist-archives

      - name: Publish to dist branch
        working-directory: dist-archives
        run: |
          git init -q
          git checkout -q -b dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Build template archives from ${GITHUB_SHA}"
          git push -q -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" dist:dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
